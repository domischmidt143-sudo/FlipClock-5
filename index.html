<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<title>Flip Clock</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background-color: #0b0b0b;
    font-family: 'Inter', system-ui, sans-serif;
  }

  .wrapper {
    width: 100%;
    height: 100%;
    background: #0b0b0b;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 24px;
    box-sizing: border-box;
    border-radius: 22px;
  }

  .clock {
    display: flex;
    gap: 18px;
    align-items: center;
  }

  .card {
    position: relative;
    width: 140px;
    height: 200px;
    perspective: 1000px;
  }

  .flip {
    position: relative;
    width: 100%;
    height: 100%;
    background: #ff006b;
    border-radius: 26px;
    overflow: hidden;
  }

  .top,
  .bottom {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #ff006b;
    color: black;
    font-size: 120px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    backface-visibility: hidden;
  }

  .top {
    top: 0;
    transform-origin: bottom;
  }

  .bottom {
    bottom: 0;
    transform-origin: top;
  }

  .split {
    position: absolute;
    top: 50%;
    width: 100%;
    height: 1px;
    background: white;
    z-index: 5;
  }

  .ampm {
    position: absolute;
    bottom: 10px;
    left: 12px;
    font-size: 18px;
    font-weight: 600;
    color: black;
    z-index: 10;
    pointer-events: none;
  }

  .flip.animate .top {
    animation: flipTop 0.45s ease-in forwards;
  }

  .flip.animate .bottom {
    animation: flipBottom 0.45s ease-out forwards;
  }

  @keyframes flipTop {
    from { transform: rotateX(0deg); }
    to   { transform: rotateX(-90deg); }
  }

  @keyframes flipBottom {
    from { transform: rotateX(90deg); }
    to   { transform: rotateX(0deg); }
  }
</style>
</head>

<body>
  <div class="wrapper">
    <div class="clock">

      <!-- HOURS -->
      <div class="card">
        <div class="flip" id="hours-card">
          <div class="top" id="h-top">12</div>
          <div class="bottom" id="h-bot">12</div>
          <div class="split"></div>
          <div class="ampm" id="ampm">AM</div>
        </div>
      </div>

      <!-- MINUTES -->
      <div class="card">
        <div class="flip" id="minutes-card">
          <div class="top" id="m-top">00</div>
          <div class="bottom" id="m-bot">00</div>
          <div class="split"></div>
        </div>
      </div>

    </div>
  </div>

<script>
  let lastHour = null;
  let lastMinute = null;

  function updateClock() {
    const now = new Date();
    let h = now.getHours();
    const m = now.getMinutes();

    const ampm = h >= 12 ? 'PM' : 'AM';
    const rawHour = h;

    h = h % 12 || 12;

    const hh = h.toString().padStart(2, '0');
    const mm = m.toString().padStart(2, '0');

    document.getElementById('ampm').textContent = ampm;

    if (rawHour !== lastHour) {
      flip('h', hh);
      flip('m', mm);
    } else if (m !== lastMinute) {
      flip('m', mm);
    }

    lastHour = rawHour;
    lastMinute = m;
  }

  function flip(unit, value) {
    const card = document.getElementById(
      unit === 'h' ? 'hours-card' : 'minutes-card'
    );

    const top = document.getElementById(`${unit}-top`);
    const bot = document.getElementById(`${unit}-bot`);

    top.textContent = value;
    bot.textContent = value;

    card.classList.remove('animate');
    void card.offsetWidth; // force reflow
    card.classList.add('animate');
  }

  updateClock();
  setInterval(updateClock, 1000);
</script>
</body>
</html>
