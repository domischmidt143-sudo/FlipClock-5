<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Flip Clock</title>

<style>
  body {
    margin: 0;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Inter', sans-serif;
  }

  .clock {
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .card {
    position: relative;
    width: 140px;
    height: 200px;
    perspective: 1000px;
  }

  .flip {
    position: relative;
    width: 100%;
    height: 100%;
    background: #ff006b;
    border-radius: 26px;
    overflow: hidden;
  }

  .top,
  .bottom {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #ff006b;
    color: black;
    font-size: 120px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    backface-visibility: hidden;
  }

  .top {
    top: 0;
  }

  .bottom {
    bottom: 0;
  }

  .split {
    position: absolute;
    top: 50%;
    width: 100%;
    height: 1.5px;
    background: white;
    z-index: 5;
  }

  .flip.animate .top {
    animation: flipTop 0.45s ease-in forwards;
  }

  .flip.animate .bottom {
    animation: flipBottom 0.45s ease-out forwards;
  }

  @keyframes flipTop {
    0% { transform: rotateX(0deg); }
    100% { transform: rotateX(-90deg); }
  }

  @keyframes flipBottom {
    0% { transform: rotateX(90deg); }
    100% { transform: rotateX(0deg); }
  }

  .ampm {
    font-size: 30px;
    color: #ff006b;
    margin-left: 10px;
    align-self: flex-end;
  }
</style>
</head>

<body>
  <div class="clock">
    <div class="card">
      <div class="flip" id="hours-card">
        <div class="top" id="h-top">12</div>
        <div class="bottom" id="h-bot">12</div>
        <div class="split"></div>
      </div>
    </div>

    <div class="card">
      <div class="flip" id="minutes-card">
        <div class="top" id="m-top">00</div>
        <div class="bottom" id="m-bot">00</div>
        <div class="split"></div>
      </div>
    </div>

    <div class="ampm" id="ampm">AM</div>
  </div>

<script>
  let lastMinute = null;

  function updateClock() {
    const now = new Date();
    let h = now.getHours();
    const m = now.getMinutes();

    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;

    const hh = h.toString().padStart(2, '0');
    const mm = m.toString().padStart(2, '0');

    document.getElementById('ampm').textContent = ampm;

    if (m !== lastMinute) {
      flip('m', mm);
      lastMinute = m;
    }
    
    if (h !== lastHour) {
      flip('h', hh);
      lastHour = h;
    }
  }

  function flip(unit, value) {
    const card = document.getElementById(
      unit === 'h' ? 'hours-card' : 'minutes-card'
    );

    const top = document.getElementById(`${unit}-top`);
    const bot = document.getElementById(`${unit}-bot`);

    top.textContent = value;
    bot.textContent = value;

    card.classList.remove('animate');
    void card.offsetWidth; // restart animation
    card.classList.add('animate');
  }

  updateClock();
  setInterval(updateClock, 1000);
</script>
</body>
</html>
