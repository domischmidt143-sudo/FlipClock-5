<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Flip Clock</title>

<style>
  body {
    margin: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Inter', sans-serif;
  }

  .clock {
    display: flex;
    gap: 14px;
    align-items: flex-end;
  }

  .unit {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .card {
    position: relative;
    width: 80px;
    height: 110px;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 0 12px rgba(255, 0, 107, 0.35);
  }

  .card div {
    position: absolute;
    width: 100%;
    height: 50%;
    background: black;
    color: #ff006b;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 54px;
    font-weight: 600;
    border: 1px solid #ff006b;
    box-sizing: border-box;
  }

  .top {
    top: 0;
    border-bottom: none;
  }

  .bottom {
    bottom: 0;
    border-top: none;
  }

  .label {
    margin-top: 6px;
    font-size: 12px;
    letter-spacing: 1px;
    color: #ff006b;
    opacity: 0.8;
  }

  .ampm {
    font-size: 22px;
    color: #ff006b;
    margin-left: 10px;
    margin-bottom: 6px;
  }
</style>
</head>

<body>
  <div class="clock">
    <div class="unit">
      <div class="card">
        <div class="top" id="h-top">12</div>
        <div class="bottom" id="h-bot">12</div>
      </div>
      <div class="label">HRS</div>
    </div>

    <div class="unit">
      <div class="card">
        <div class="top" id="m-top">00</div>
        <div class="bottom" id="m-bot">00</div>
      </div>
      <div class="label">MIN</div>
    </div>

    <div class="ampm" id="ampm">AM</div>
  </div>

<script>
  function updateClock() {
    const now = new Date();
    let h = now.getHours();
    const m = now.getMinutes();

    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;

    const hh = h.toString().padStart(2, '0');
    const mm = m.toString().padStart(2, '0');

    document.getElementById('h-top').textContent = hh;
    document.getElementById('h-bot').textContent = hh;
    document.getElementById('m-top').textContent = mm;
    document.getElementById('m-bot').textContent = mm;
    document.getElementById('ampm').textContent = ampm;
  }

  setInterval(updateClock, 1000);
  updateClock();
</script>
</body>
</html>
