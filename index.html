<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Flip Clock</title>

<style>
  body {
    margin: 0;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Inter', sans-serif;
  }

  .clock {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .card {
    position: relative;
    width: 110px;
    height: 160px;
    background: black;
    border-radius: 22px;
    overflow: hidden;
    box-shadow: 0 0 14px rgba(255, 0, 107, 0.35);
  }

  .number {
    position: absolute;
    width: 100%;
    height: 100%;
    color: #ff006b;
    font-size: 96px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .split {
    position: absolute;
    top: 50%;
    width: 100%;
    height: 2px;
    background: #ff006b;
    opacity: 0.9;
  }

  .ampm {
    font-size: 26px;
    color: #ff006b;
    margin-left: 8px;
    align-self: flex-end;
  }
</style>
</head>

<body>
  <div class="clock">
    <div class="card">
      <div class="number" id="hours">12</div>
      <div class="split"></div>
    </div>

    <div class="card">
      <div class="number" id="minutes">00</div>
      <div class="split"></div>
    </div>

    <div class="ampm" id="ampm">AM</div>
  </div>

<script>
  function updateClock() {
    const now = new Date();
    let h = now.getHours();
    const m = now.getMinutes();

    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;

    document.getElementById('hours').textContent =
      h.toString().padStart(2, '0');
    document.getElementById('minutes').textContent =
      m.toString().padStart(2, '0');
    document.getElementById('ampm').textContent = ampm;
  }

  setInterval(updateClock, 1000);
  updateClock();
</script>
</body>
</html>
